<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live SLIDE CENTER — Local Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #09090b; color: #f4f4f5; font-family: system-ui, sans-serif; min-height: 100vh; }
    header { background: #18181b; border-bottom: 1px solid #27272a; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 15px; font-weight: 600; }
    header .badge { font-size: 11px; background: #1d4ed8; color: #bfdbfe; border-radius: 4px; padding: 2px 8px; }
    main { padding: 24px; max-width: 860px; }
    .card { background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; }
    .card h2 { font-size: 13px; font-weight: 600; color: #a1a1aa; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-row { display: flex; gap: 24px; flex-wrap: wrap; }
    .stat { }
    .stat .value { font-size: 28px; font-weight: 700; color: #f4f4f5; }
    .stat .label { font-size: 12px; color: #71717a; margin-top: 2px; }
    input[type="text"] { background: #09090b; border: 1px solid #27272a; border-radius: 6px; color: #f4f4f5; padding: 8px 12px; font-size: 14px; width: 100%; outline: none; }
    input[type="text"]:focus { border-color: #2563eb; }
    button { border: none; cursor: pointer; border-radius: 6px; font-size: 14px; font-weight: 500; padding: 8px 16px; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: #27272a; color: #d4d4d8; }
    .btn-ghost:hover { background: #3f3f46; }
    .row { display: flex; gap: 8px; align-items: center; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { text-align: left; color: #71717a; padding: 6px 8px; border-bottom: 1px solid #27272a; font-weight: 500; }
    tbody td { padding: 8px; border-bottom: 1px solid #18181b; color: #d4d4d8; }
    .status-ok { color: #4ade80; }
    .status-err { color: #f87171; }
    .log { background: #000; border: 1px solid #27272a; border-radius: 6px; padding: 10px 12px; font-family: monospace; font-size: 12px; color: #a1a1aa; max-height: 160px; overflow-y: auto; white-space: pre-wrap; }
    .form-group { margin-bottom: 12px; }
    label { font-size: 13px; color: #a1a1aa; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Live SLIDE CENTER</h1>
      <div style="font-size:12px;color:#71717a;margin-top:2px;">Local Agent v<span id="agentVersion">0.1.0</span></div>
    </div>
    <span class="badge" id="statusBadge">Avvio…</span>
  </header>

  <main>
    <!-- Stato -->
    <div class="card">
      <h2>Stato</h2>
      <div class="stat-row">
        <div class="stat">
          <div class="value" id="statFiles">—</div>
          <div class="label">File in cache</div>
        </div>
        <div class="stat">
          <div class="value" id="statAgents">—</div>
          <div class="label">Room Agent connessi</div>
        </div>
        <div class="stat">
          <div class="value" id="statEvent" style="font-size:16px;margin-top:6px;">—</div>
          <div class="label">Evento attivo</div>
        </div>
      </div>
    </div>

    <!-- Configurazione evento -->
    <div class="card">
      <h2>Evento</h2>
      <div class="form-group">
        <label for="inputEventId">ID Evento (UUID Supabase)</label>
        <input type="text" id="inputEventId" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
      </div>
      <div class="row">
        <button class="btn-primary" onclick="setEvent()">Imposta evento</button>
        <button class="btn-ghost" onclick="syncEvent()" id="btnSync">Sincronizza ora</button>
      </div>
    </div>

    <!-- File in cache -->
    <div class="card">
      <h2>File in cache</h2>
      <table>
        <thead><tr><th>File</th><th>Versione</th><th>Sala</th><th>Scaricato</th></tr></thead>
        <tbody id="fileTable"><tr><td colspan="4" style="color:#52525b;padding:12px 8px;">Nessun file in cache.</td></tr></tbody>
      </table>
    </div>

    <!-- Room Agent connessi -->
    <div class="card">
      <h2>Room Agent</h2>
      <table>
        <thead><tr><th>Dispositivo</th><th>IP</th><th>Porta</th><th>Sala</th><th>Visto</th></tr></thead>
        <tbody id="agentTable"><tr><td colspan="5" style="color:#52525b;padding:12px 8px;">Nessun Room Agent registrato.</td></tr></tbody>
      </table>
    </div>

    <!-- Log -->
    <div class="card">
      <h2>Log</h2>
      <div class="log" id="logBox">Attendere…</div>
    </div>
  </main>

  <script>
    const { invoke } = window.__TAURI__.core;

    function log(msg) {
      const box = document.getElementById('logBox');
      box.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
      box.scrollTop = box.scrollHeight;
    }

    async function refreshStatus() {
      try {
        const s = await invoke('cmd_get_status');
        document.getElementById('agentVersion').textContent = s.version || '0.1.0';
        document.getElementById('statusBadge').textContent = 'Online';
        document.getElementById('statusBadge').style.background = '#16a34a';
        document.getElementById('statusBadge').style.color = '#dcfce7';
        document.getElementById('statFiles').textContent = s.cached_files;
        document.getElementById('statAgents').textContent = s.room_agents;
        document.getElementById('statEvent').textContent = s.event_id || '—';
      } catch (e) {
        document.getElementById('statusBadge').textContent = 'Errore';
        document.getElementById('statusBadge').style.background = '#b91c1c';
      }
    }

    async function refreshFiles() {
      try {
        const files = JSON.parse(await invoke('cmd_list_files'));
        const tbody = document.getElementById('fileTable');
        if (!files || files.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="color:#52525b;padding:12px 8px;">Nessun file in cache.</td></tr>';
          return;
        }
        tbody.innerHTML = files.map(f =>
          `<tr><td>${f.filename}</td><td style="font-family:monospace;font-size:11px;">${f.version_id.slice(0,8)}…</td><td>${f.room_id || '—'}</td><td>${f.downloaded_at}</td></tr>`
        ).join('');
      } catch {}
    }

    async function refreshAgents() {
      try {
        const agents = JSON.parse(await invoke('cmd_list_room_agents'));
        const tbody = document.getElementById('agentTable');
        if (!agents || agents.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="color:#52525b;padding:12px 8px;">Nessun Room Agent registrato.</td></tr>';
          return;
        }
        tbody.innerHTML = agents.map(a =>
          `<tr><td>${a.device_name}</td><td>${a.ip}</td><td>${a.port}</td><td>${a.room_id || '—'}</td><td>${a.last_seen}</td></tr>`
        ).join('');
      } catch {}
    }

    async function setEvent() {
      const id = document.getElementById('inputEventId').value.trim();
      if (!id) return;
      try {
        await invoke('cmd_set_event', { eventId: id });
        log('Evento impostato: ' + id);
        await refreshStatus();
      } catch (e) { log('Errore: ' + e); }
    }

    async function syncEvent() {
      const btn = document.getElementById('btnSync');
      btn.disabled = true;
      btn.textContent = 'Sincronizzazione…';
      log('Avvio sincronizzazione…');
      try {
        const result = await invoke('cmd_sync_event');
        log('Sincronizzazione completata: ' + result);
        await refreshFiles();
        await refreshStatus();
      } catch (e) { log('Errore sync: ' + e); }
      btn.disabled = false;
      btn.textContent = 'Sincronizza ora';
    }

    async function init() {
      await refreshStatus();
      await refreshFiles();
      await refreshAgents();
      log('Local Agent avviato. Server HTTP LAN in ascolto su :8080');
      setInterval(async () => {
        await refreshStatus();
        await refreshFiles();
        await refreshAgents();
      }, 10000);
    }

    init().catch(e => log('Init error: ' + e));
  </script>
</body>
</html>
