name: Deploy Supabase (migrations + edge functions)

# Sprint Q+1 hardening commerciale.
# Trigger: push su `main` che tocca migrations o functions.
# Modalita': MANUALE (workflow_dispatch) di default, automatica solo se l'env
#            secret `SUPABASE_AUTO_DEPLOY` e' settata. Cosi' nessun rischio di
#            push DDL non voluto in produzione.
#
# Cosa fa:
#   1. db push delle nuove migration (idempotente, fallisce su conflitti).
#   2. functions deploy delle Edge Function modificate.
#   3. opzionale: verifica advisor security/perf via `supabase db lint`.
#
# Secret richiesti su GitHub (Settings → Secrets and variables → Actions):
#   - SUPABASE_PROJECT_REF       project ref alfanumerico
#   - SUPABASE_ACCESS_TOKEN      personal access token
#   - SUPABASE_DB_PASSWORD       db password (per db push non-interactive)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**.sql'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:
    inputs:
      deploy_migrations:
        description: 'Esegui supabase db push (rischio: DDL su prod)?'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']
      deploy_functions:
        description: 'Esegui supabase functions deploy?'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

concurrency:
  group: supabase-deploy
  cancel-in-progress: false # non interrompere un deploy a meta'

jobs:
  deploy:
    name: Deploy to ${{ vars.SUPABASE_ENV || 'production' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # NOTE: per attivare protection rules (manual approval, env-scoped secrets),
    # creare manualmente l'environment in GitHub Settings → Environments → New
    # environment: "supabase-production". Poi rimuovere il commento sotto.
    # environment:
    #   name: supabase-production
    #   url: https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.20.3

      - name: Verifica secrets richiesti
        run: |
          set -e
          if [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ]; then
            echo "::error::Missing secret SUPABASE_PROJECT_REF"; exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "::error::Missing secret SUPABASE_ACCESS_TOKEN"; exit 1
          fi

      - name: Link al progetto Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" \
            ${{ secrets.SUPABASE_DB_PASSWORD && format('--password {0}', secrets.SUPABASE_DB_PASSWORD) || '' }}

      - name: Lista migrations remote vs locali (dry-run)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase migration list --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Push migrations (DDL)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_migrations == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase db push --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Deploy Edge Functions
        if: ${{ github.event_name == 'push' || github.event.inputs.deploy_functions == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Deploy di tutte le function in parallelo. Se qualche function ha
          # `verify_jwt = false` in config.toml viene rispettato.
          supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Notifica deploy completato
        if: success()
        run: |
          echo "::notice::Supabase deploy completato per project ${{ secrets.SUPABASE_PROJECT_REF }}"
